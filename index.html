<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>あしたはほいくえん？</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif;
        text-align: center;
        overflow: hidden;
    }
    
    .day-label {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
        opacity: 0.7;
    }
    
    .date-text {
        font-size: 1.8rem;
        font-weight: bold;
    }

    #today-section {
        flex: 1;
        background-color: #f0f4f8;
        color: #555;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-bottom: 4px dashed #ccc;
    }

    #tomorrow-section {
        flex: 2; 
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: background-color 0.5s ease;
    }

    .status-icon {
        font-size: 6rem;
        margin: 1rem 0;
        animation: bounce 2s infinite;
    }
    
    .status-text {
        font-size: 3rem;
        font-weight: bold;
    }

    .is-hoikuen {
        background-color: #fff9c4;
        color: #ef6c00;
    }
    
    .is-oyasumi {
        background-color: #ffcdd2;
        color: #c62828;
    }

    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-20px); }
        60% { transform: translateY(-10px); }
    }
</style>
</head>
<body>

<div id="today-section">
    <div class="day-label">きょう</div>
    <div id="today-date" class="date-text"></div>
</div>

<div id="tomorrow-section">
    <div class="day-label">あした</div>
    <div id="tomorrow-date" class="date-text"></div>
    <div id="tomorrow-icon" class="status-icon"></div>
    <div id="tomorrow-status" class="status-text"></div>
</div>

<script>
    const days = ['にち', 'げつ', 'か', 'すい', 'もく', 'きん', 'ど'];
    let publicHolidays = {};
    let customSchedule = {};

    // YYYY-MM-DD形式の文字列を作る関数
    function formatDateString(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // 祝日データを取得
    async function fetchHolidays() {
        try {
            const response = await fetch('https://holidays-jp.github.io/api/v1/date.json');
            if (response.ok) {
                publicHolidays = await response.json();
            }
        } catch (error) {
            console.error('祝日データの取得に失敗しました:', error);
        }
    }

    // CSVデータを取得
    async function fetchCustomSchedule() {
        try {
            const response = await fetch('schedule.csv');
            if (response.ok) {
                const csvText = await response.text();
                const lines = csvText.split('\n');
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line) {
                        const [dateStr, status] = line.split(',');
                        customSchedule[dateStr] = status.trim();
                    }
                }
            }
        } catch (error) {
            console.error('CSVデータの読み込みをスキップしました:', error);
        }
    }

    // 画面の更新処理
    function updateDisplay() {
        const now = new Date();
        const todayStr = `${now.getMonth() + 1}がつ${now.getDate()}にち (${days[now.getDay()]}ようび)`;
        document.getElementById('today-date').innerText = todayStr;

        const tomorrow = new Date(now);
        tomorrow.setDate(now.getDate() + 1);
        const tomorrowStr = `${tomorrow.getMonth() + 1}がつ${tomorrow.getDate()}にち (${days[tomorrow.getDay()]}ようび)`;
        document.getElementById('tomorrow-date').innerText = tomorrowStr;

        const tomorrowYMD = formatDateString(tomorrow);
        
        let isHoikuen = true; // 基本は保育園

        // 判定ロジック
        if (customSchedule[tomorrowYMD]) {
            // 1. CSVに予定があれば最優先
            isHoikuen = (customSchedule[tomorrowYMD] === 'hoikuen');
        } else {
            // 2. CSVになければカレンダー通りに判定
            const isWeekend = tomorrow.getDay() === 0 || tomorrow.getDay() === 6;
            const isHoliday = publicHolidays.hasOwnProperty(tomorrowYMD);
            
            if (isWeekend || isHoliday) {
                isHoikuen = false;
            }
        }

        // 表示の切り替え
        const tomorrowSection = document.getElementById('tomorrow-section');
        const tomorrowIcon = document.getElementById('tomorrow-icon');
        const tomorrowStatus = document.getElementById('tomorrow-status');

        if (!isHoikuen) {
            tomorrowSection.className = 'is-oyasumi';
            tomorrowIcon.innerText = '🏠';
            tomorrowStatus.innerText = 'おやすみ';
        } else {
            tomorrowSection.className = 'is-hoikuen';
            tomorrowIcon.innerText = '📛';
            tomorrowStatus.innerText = 'ほいくえん';
        }
    }

    // アプリ初期化処理
    async function initApp() {
        await Promise.all([fetchHolidays(), fetchCustomSchedule()]);
        updateDisplay();
    }

    initApp();
    setInterval(updateDisplay, 1000 * 60 * 60); // 1時間ごとに表示更新
</script>

</body>
</html>
